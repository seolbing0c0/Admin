<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f5f5f5;
  font-family: -apple-system, sans-serif;
  color: #111;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🔐 로그인 카드 */
#login {
  width: 260px;
  background: #111;
  padding: 16px;
  border-radius: 12px;
}

/* 입력칸 밝은 회색 */
input {
  width: 100%;
  padding: 8px;
  background: #e0e0e0;
  border: none;
  color: #111;
  border-radius: 6px;
  outline: none;
}

/* 버튼 흰색 */
button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  font-size: 12px;
  background: #ffffff;
  color: #111;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* 📩 메시지 영역 */
#main {
  display: none;
  width: 100%;
  max-width: 260px;
  height: 90vh;
  overflow-y: auto;
}

/* 카드 */
.msg {
  background: #111;
  color: #eee;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  position: relative;
}

/* 이름 */
.name {
  font-size: 10px;
  color: #aaa;
}

/* 시간 */
.time {
  font-size: 10px;
  color: #666;
  margin-top: 4px;
}

/* 삭제 */
.delete {
  position: absolute;
  right: 8px;
  top: 8px;
  font-size: 10px;
  cursor: pointer;
  opacity: 0.5;
}

.delete:hover {
  opacity: 1;
}
</style>
</head>

<body>

<!-- 🔐 로그인 -->
<div id="login">
  <input type="password" id="pw" placeholder="password">
  <button onclick="login()">enter</button>
</div>

<!-- 📩 메시지 -->
<div id="main"></div>

<script>
const PASSWORD = "1234"; // 🔒 바꿔도 됨

function login() {
  if (document.getElementById("pw").value === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.body.style.alignItems = "flex-start"; // 위쪽 정렬로 변경
    load();
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyBNgsQayMLKkOe7u4bKkjyIMlB56v-LTwY",
  authDomain: "talk-fdee0.firebaseapp.com",
  projectId: "talk-fdee0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ⏱ 시간 표시 */
function timeAgo(date) {
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);

  if (diff < 60) return diff + "초 전";
  if (diff < 3600) return Math.floor(diff / 60) + "분 전";
  if (diff < 86400) return Math.floor(diff / 3600) + "시간 전";
  return Math.floor(diff / 86400) + "일 전";
}

/* 📡 실시간 불러오기 */
function load() {
  const list = document.getElementById("main");

  db.collection("messages")
    .orderBy("time", "desc") // 🔝 최신 맨 위
    .onSnapshot(snapshot => {
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "msg";

        const time = data.time ? timeAgo(data.time.toDate()) : "";

        div.innerHTML = `
          <div class="name">${data.name}</div>
          <div>${data.text}</div>
          <div class="time">${time}</div>
          <div class="delete" onclick="del('${doc.id}')">x</div>
        `;

        list.appendChild(div);
      });

      // 🔔 새 메시지 알림
      if (snapshot.docChanges().some(c => c.type === "added")) {
        new Audio("https://actions.google.com/sounds/v1/alarms/notification_simple-01.mp3").play();
      }
    });
}

/* 🗑 삭제 */
function del(id) {
  db.collection("messages").doc(id).delete();
}
</script>

</body>
</html>
